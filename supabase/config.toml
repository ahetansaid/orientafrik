# Configuration Supabase CLI (dev local). Voir https://supabase.com/docs/guides/cli/config
project_id = "orientafrik"

# NB : ports en 553xx pour éviter les plages réservées par WinNAT/Hyper-V
# sur cette machine Windows (54316–54815 exclus).
[api]
enabled = true
port = 55321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55322
shadow_port = 55320
major_version = 15

[db.pooler]
enabled = false
port = 55329
pool_mode = "transaction"

[studio]
enabled = true
port = 55323

[inbucket]
port = 55324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
# Email-first : OTP / magic link. Pas de mot de passe requis.
double_confirm_changes = true

[analytics]
enabled = false
