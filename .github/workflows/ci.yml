name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Valeurs factices : suffisent au build (aucun appel réseau à la compilation).
      DATABASE_URL: postgresql://u:p@ep-ci.eu-central-1.aws.neon.tech/db?sslmode=require
      BETTER_AUTH_SECRET: ci-better-auth-secret-placeholder-32chars
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Tests unitaires
        run: npm run test:run
      - name: Build
        run: npm run build
