name: E2E

# Déclenchement manuel uniquement : les specs E2E doivent être réécrites pour la
# stack Neon (Better Auth + Drizzle) — les anciennes specs RLS/Supabase ont été
# retirées. Fournir un DATABASE_URL de test (branche Neon dédiée) via un secret.
on:
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.TEST_BETTER_AUTH_SECRET }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Migrer la base de test (Drizzle)
        run: npm run drizzle:migrate
      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Tests e2e
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
